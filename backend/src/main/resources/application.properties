spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.devtools.add-properties=false
spring.devtools.restart.enabled=${DEVTOOLS_RESTART_ENABLED:false}
spring.devtools.livereload.enabled=false
logging.level.root=INFO
server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/c3d1_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# Task submission uploads (pptx, zip, rar, ...)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
c3d1.upload-dir=${UPLOAD_DIR:uploads}

c3d1.jwt.secret=${JWT_SECRET}
c3d1.frontend-url=${FRONTEND_URL:http://localhost:5173}
c3d1.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
c3d1.google.client-id=${GOOGLE_CLIENT_ID:}
c3d1.mail.enabled=${MAIL_ENABLED:false}
c3d1.mail.from=${MAIL_FROM:}

c3d1.ai.provider=${AI_PROVIDER:openai}
c3d1.ai.endpoint=${AI_ENDPOINT:https://api.openai.com/v1/chat/completions}
c3d1.ai.api-key=${AI_API_KEY:}
c3d1.ai.model=${AI_MODEL:gpt-4o-mini}
c3d1.ai.max-tokens=${AI_MAX_TOKENS:400}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
